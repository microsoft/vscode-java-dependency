name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  linuxUI:
    name: Linux-UI
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
    - uses: actions/checkout@v4

    - name: Setup Build Environment
      run: |
        sudo apt-get update
        sudo apt-get install -y libxkbfile-dev pkg-config libsecret-1-dev libxss1 dbus xvfb libgtk-3-0 libgbm1
        sudo /usr/bin/Xvfb :99 -screen 0 1024x768x24 > /dev/null 2>&1 &
        sleep 3

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Setup Node.js environment
      uses: actions/setup-node@v4
      with:
        node-version: 20
        
    - name: Install Node.js modules
      run: npm install

    - name: Install VSCE
      run: npm install -g @vscode/vsce

    - name: Build OSGi bundle
      run: npm run build-server

    - name: Build VSIX file
      run: vsce package -o vscode-java-dependency.vsix

    - name: Setup autotest
      run: npm install -g github:wenytang-ms/javaext-autotest

    - name: E2E Test (autotest)
      run: |
        DISPLAY=:99 autotest run-all test/e2e-plans \
          --vsix $(pwd)/vscode-java-dependency.vsix \
          --output test-results \
          --no-llm

    - name: Upload test results
      if: ${{ always() }}
      uses: actions/upload-artifact@v4
      with:
        name: e2e-results-linux
        path: test-results/
        retention-days: 7
